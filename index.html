<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Temperature Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #45a049;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Temperature Converter</h1>

    <input type="number" id="tempInput" placeholder="Enter temperature">

    <select id="fromUnit">
      <option value="C">Celsius (°C)</option>
      <option value="F">Fahrenheit (°F)</option>
      <option value="K">Kelvin (K)</option>
    </select>

    <select id="toUnit">
      <option value="C">Celsius (°C)</option>
      <option value="F">Fahrenheit (°F)</option>
      <option value="K">Kelvin (K)</option>
    </select>

    <button onclick="convertTemp()">Convert</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function convertTemp() {
      const input = document.getElementById("tempInput").value;
      const from = document.getElementById("fromUnit").value;
      const to = document.getElementById("toUnit").value;
      const resultDiv = document.getElementById("result");

      if (input === "") {
        resultDiv.innerText = "Please enter a value";
        return;
      }

      let temp = parseFloat(input);

      // Convert to Celsius first
      if (from === "F") {
        temp = (temp - 32) * 5/9;
      } else if (from === "K") {
        temp = temp - 273.15;
      }

      // Convert from Celsius to target
      let finalTemp;
      if (to === "C") {
        finalTemp = temp;
      } else if (to === "F") {
        finalTemp = (temp * 9/5) + 32;
      } else if (to === "K") {
        finalTemp = temp + 273.15;
      }

      resultDiv.innerText = `Converted Temperature: ${finalTemp.toFixed(2)} °${to}`;
    }
  </script>

</body>
</html>
